name: Full Stack Deploy (Main PC)

# Brings up ALL services on the main PC.
# Triggered after unit Tests pass when infra/ files changed, or manually.
# E2E runs independently and does not affect this workflow.
# Rolling workers/game updates use deploy-mainpc.yml instead.

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-mainpc
  cancel-in-progress: false

jobs:
  check:
    name: Check if deploy needed
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.result.outputs.value }}
    steps:
      - name: Check for infra changes
        if: github.event_name != 'workflow_dispatch'
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          COUNT=$(gh api "repos/${{ github.repository }}/commits/$SHA" \
            --jq '[.files[].filename | select(startswith("infra/"))] | length')
          echo "changed=$( [ "$COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ steps.diff.outputs.changed }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy full stack
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for image builds
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          for wf in "build-game.yml" "build-workers.yml"; do
            RUN_ID=$(gh run list --workflow="$wf" --branch=main -L 10 \
              --json headSha,databaseId \
              -q ".[] | select(.headSha==\"$SHA\") | .databaseId" | head -1)
            if [ -n "$RUN_ID" ]; then
              echo "Waiting for $wf (run $RUN_ID)..."
              gh run watch "$RUN_ID" --exit-status
            else
              echo "No $wf run for $SHA — skipping"
            fi
          done

      - name: Create deploy archive
        run: git archive HEAD infra/ migrations/ -o deploy.tar.gz

      - name: Upload archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.MAINPC_SSH_HOST }}
          username: deploy
          key:      ${{ secrets.MAINPC_SSH_KEY }}
          port:     1337
          source:   deploy.tar.gz
          target:   /home/deploy/

      - name: Deploy full stack
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_PASSWORD:   ${{ secrets.POSTGRES_PASSWORD }}
          RABBITMQ_PASS:       ${{ secrets.RABBITMQ_PASS }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          JWT_SECRET:          ${{ secrets.JWT_SECRET }}
          LIVEKIT_API_KEY:     ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET:  ${{ secrets.LIVEKIT_API_SECRET }}
          GRAFANA_PASSWORD:    ${{ secrets.GRAFANA_PASSWORD }}
          DOCKERHUB_USERNAME:  ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:     ${{ secrets.DOCKERHUB_TOKEN }}
          DOMAIN:              ${{ vars.DOMAIN }}
          ORIGIN_CERT:         ${{ secrets.ORIGIN_CERT }}
          ORIGIN_KEY:          ${{ secrets.ORIGIN_KEY }}
          PGADMIN_PASSWORD:    ${{ secrets.PGADMIN_PASSWORD }}
        with:
          host:     ${{ secrets.MAINPC_SSH_HOST }}
          username: deploy
          key:      ${{ secrets.MAINPC_SSH_KEY }}
          port:     1337
          envs:     POSTGRES_PASSWORD,RABBITMQ_PASS,MINIO_ROOT_PASSWORD,JWT_SECRET,LIVEKIT_API_KEY,LIVEKIT_API_SECRET,GRAFANA_PASSWORD,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DOMAIN,ORIGIN_CERT,ORIGIN_KEY,PGADMIN_PASSWORD
          script: |
            set -e
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            mkdir -p /opt/gssr
            tar -xzf ~/deploy.tar.gz -C /opt/gssr --overwrite --no-same-owner
            rm -f ~/deploy.tar.gz
            cd /opt/gssr

            {
              printf 'POSTGRES_USER=gssr\n'
              printf 'POSTGRES_PASSWORD=%s\n'      "${POSTGRES_PASSWORD}"
              printf 'POSTGRES_DB=gssr\n'
              printf 'DATABASE_URL=postgres://gssr:%s@postgres:5432/gssr?sslmode=disable\n' "${POSTGRES_PASSWORD}"
              printf 'VALKEY_URL=redis://valkey:6379\n'
              printf 'RABBITMQ_USER=gssr\n'
              printf 'RABBITMQ_PASS=%s\n'          "${RABBITMQ_PASS}"
              printf 'RABBITMQ_URL=amqp://gssr:%s@rabbitmq:5672/\n' "${RABBITMQ_PASS}"
              printf 'MINIO_ROOT_USER=gssr\n'
              printf 'MINIO_ROOT_PASSWORD=%s\n'    "${MINIO_ROOT_PASSWORD}"
              printf 'MINIO_ACCESS_KEY=gssr\n'
              printf 'MINIO_SECRET_KEY=%s\n'       "${MINIO_ROOT_PASSWORD}"
              printf 'MINIO_ENDPOINT=minio:9000\n'
              printf 'MINIO_BUCKET=gssr\n'
              printf 'POSTGRES_URL=postgres://gssr:%s@postgres:5432/gssr?sslmode=disable\n' "${POSTGRES_PASSWORD}"
              printf 'JWT_SECRET=%s\n'             "${JWT_SECRET}"
              printf 'JWT_ACCESS_TTL=15m\n'
              printf 'JWT_REFRESH_TTL=168h\n'
              printf 'WORKERS_DATABASE_URL=postgresql+asyncpg://gssr:%s@postgres:5432/gssr\n' "${POSTGRES_PASSWORD}"
              printf 'ADMIN_JWT_SECRET=%s\n'       "${JWT_SECRET}"
              printf 'CORS_ORIGINS=https://%s,https://admin.%s\n' "${DOMAIN}" "${DOMAIN}"
              printf 'ADMIN_CORS_ORIGINS=https://admin.%s\n' "${DOMAIN}"
              printf 'NSFW_MODEL_PATH=/app/models/nsfw.onnx\n'
              printf 'NSFW_THRESHOLD=0.7\n'
              printf 'LIVEKIT_URL=ws://livekit:7880\n'
              printf 'LIVEKIT_API_KEY=%s\n'        "${LIVEKIT_API_KEY}"
              printf 'LIVEKIT_API_SECRET=%s\n'     "${LIVEKIT_API_SECRET}"
              printf 'GRAFANA_PASSWORD=%s\n'       "${GRAFANA_PASSWORD}"
              printf 'DOMAIN=%s\n'                 "${DOMAIN}"
              printf 'DOCKERHUB_USERNAME=%s\n'     "${DOCKERHUB_USERNAME}"
              printf 'PGADMIN_EMAIL=admin@%s\n'    "${DOMAIN}"
              printf 'PGADMIN_PASSWORD=%s\n'       "${PGADMIN_PASSWORD}"
            } > infra/compose/.env

            # Substitute ${DOMAIN} in nginx upstream config.
            envsubst '${DOMAIN}' < infra/nginx/upstream.conf > infra/nginx/upstream_sub.conf
            mv infra/nginx/upstream_sub.conf infra/nginx/upstream.conf

            # Write Cloudflare Origin Certificate for nginx SSL
            # Secrets are stored as base64 to survive SSH transport (PEM has newlines)
            mkdir -p infra/nginx/ssl
            printf '%s' "${ORIGIN_CERT}" | base64 -d > infra/nginx/ssl/origin.pem
            printf '%s' "${ORIGIN_KEY}"  | base64 -d > infra/nginx/ssl/origin.key
            chmod 600 infra/nginx/ssl/origin.key

            printf 'port: 7880\nrtc:\n  port_range_start: 50000\n  port_range_end: 60000\n  tcp_port: 7881\nkeys:\n  %s: %s\nlogging:\n  level: info\n' \
              "${LIVEKIT_API_KEY}" "${LIVEKIT_API_SECRET}" \
              > infra/compose/livekit.yaml

            docker compose -f infra/compose/docker-compose.mainpc.yml pull
            docker compose -f infra/compose/docker-compose.mainpc.yml up -d --force-recreate

            # Run database migrations
            docker run --rm \
              --network gssr_default \
              -v "$(pwd)/migrations:/migrations" \
              -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
              golang:1.22-alpine \
              sh -c 'go install github.com/pressly/goose/v3/cmd/goose@v3.20.0 && goose -dir /migrations postgres "postgres://gssr:${POSTGRES_PASSWORD}@postgres:5432/gssr?sslmode=disable" up'

            echo "Full stack deploy complete"
