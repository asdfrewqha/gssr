name: Deploy Static (Frontend + Admin)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "admin/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            admin/package-lock.json
      - name: Install and build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
          VITE_S3_URL: ${{ vars.VITE_S3_URL }}
          VITE_LIVEKIT_URL: ${{ vars.VITE_LIVEKIT_URL }}
      - name: Install and build admin
        working-directory: admin
        run: npm ci && npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_S3_URL: ${{ vars.VITE_S3_URL }}
      - name: Merge admin into frontend dist
        run: |
          mkdir -p frontend/dist/admin
          cp -r admin/dist/. frontend/dist/admin/
          cp frontend/dist/index.html frontend/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
