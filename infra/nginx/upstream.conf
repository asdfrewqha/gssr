# Zynq ARM nodes — game engine
# Update IPs to match your LAN topology
upstream zynq_game {
    least_conn;
    server 192.168.1.101:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.102:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.103:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.104:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.105:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── game + admin (main API traffic) ──────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    server_name game.* admin.*;

    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://zynq_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/admin/ {
        proxy_pass http://workers:8000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://zynq_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /ws/ {
        proxy_pass http://zynq_game;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /s3/ {
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass http://minio:9000;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /livekit/ {
        proxy_pass http://livekit:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ── grafana ──────────────────────────────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    server_name grafana.*;

    location / {
        proxy_pass http://grafana:3000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/live/ {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ── s3 (MinIO Console) ──────────────────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    server_name s3.*;

    location / {
        proxy_pass http://minio:9001;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /ws {
        proxy_pass http://minio:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ── mq (RabbitMQ Management) ────────────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    server_name mq.*;

    location / {
        proxy_pass http://rabbitmq:15672;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

# ── portainer ────────────────────────────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    server_name portainer.*;

    location / {
        proxy_pass http://portainer:9000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/websocket/ {
        proxy_pass http://portainer:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ── catch-all: reject unknown hosts ─────────────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    return 444;
}
