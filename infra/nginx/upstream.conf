# Game engine: Main PC primary + Zynq ARM nodes as backup
upstream zynq_game {
    least_conn;
    server game:3000 max_fails=3 fail_timeout=30s;
    # Zynq ARM nodes (backup when available)
    server 192.168.1.101:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.102:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.103:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.104:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.105:3000 max_fails=3 fail_timeout=30s backup;
    keepalive 32;
}

# ── api.${DOMAIN} — public backend ───────────────────────────────────────────
# ${DOMAIN} is substituted by envsubst during deploy (deploy-mainpc*.yml).
# Serves: game API, WebSocket, workers admin API, MinIO S3, LiveKit.
server {
    listen 80;
    listen 443 ssl;
    server_name api.${DOMAIN};

    # ── Auth endpoints — strict rate limit (5 req/s, burst 10) ──────────────
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Game REST API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── WebSocket (room events) ──────────────────────────────────────────────
    location /ws/ {
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Workers admin API (used by admin panel at admin.${DOMAIN}) ───────────
    # Admin panel calls /admin/stats, /admin/maps, /admin/users, /admin/panoramas
    location /admin/ {
        set $backend_workers http://workers:8000;
        proxy_pass $backend_workers;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── MinIO S3 — panorama tiles, floor images, avatars ─────────────────────
    # Panorama tiles — UUID path, truly immutable → 1 year
    location ~* ^/s3/gssr-panoramas/maps/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Raw panoramas — admin-only upload source, no CDN cache
    location ~* ^/s3/gssr-panoramas/raw/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "no-store";
    }

    # Floor images + avatars — can be replaced, short cache
    location ~* ^/s3/gssr-(floors|avatars)/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── LiveKit (voice chat WebSocket + HTTP signaling) ──────────────────────
    location /livekit/ {
        set $backend_livekit http://livekit:7880;
        proxy_pass $backend_livekit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ── catch-all: reject unknown hosts ─────────────────────────────────────────
# SSH tunnel comment: ssh -L 3001:localhost:3001 -L 5050:localhost:5050
#   -L 9001:localhost:9001 -L 15672:localhost:15672 -L 9002:localhost:9002
#   -p $SSH_PORT deploy@<server-ip>
# Then: http://localhost:3001 grafana, :5050 pgadmin, :9001 minio, :15672 mq, :9002 portainer
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    return 444;
}
