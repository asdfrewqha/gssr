# Zynq ARM nodes — game engine
# Update IPs to match your LAN topology
upstream zynq_game {
    least_conn;
    server 192.168.1.101:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.102:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.103:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.104:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.105:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── game + admin (main API traffic) ──────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    server_name game.* admin.*;

    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://zynq_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/admin/ {
        set $backend_workers http://workers:8000;
        proxy_pass $backend_workers;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://zynq_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /ws/ {
        proxy_pass http://zynq_game;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /s3/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /livekit/ {
        set $backend_livekit http://livekit:7880;
        proxy_pass $backend_livekit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ── Admin panels: local network only (access via SSH tunnel) ─────
# Usage: ssh -L 3001:localhost:3001 -L 9001:localhost:9001 \
#            -L 15672:localhost:15672 -L 9002:localhost:9002 \
#            -p 1337 deploy@<server-ip>
# Then open http://localhost:3001 (grafana), http://localhost:9001 (minio), etc.

# ── catch-all: reject unknown hosts ─────────────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    return 444;
}
