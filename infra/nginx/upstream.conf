# Zynq ARM nodes — game engine
# Update IPs to match your LAN topology
upstream zynq_game {
    least_conn;
    server 192.168.1.101:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.102:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.103:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.104:3000 max_fails=3 fail_timeout=30s;
    server 192.168.1.105:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # --- Auth endpoints (stricter rate limit) ---
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://zynq_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- Admin API → workers (Main PC, not Zynq) ---
    location /api/admin/ {
        proxy_pass http://workers:8000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- Game API → Zynq load balancer ---
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://zynq_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- WebSocket → Zynq ---
    location /ws/ {
        proxy_pass http://zynq_game;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- MinIO tiles (direct, bypass Zynq) ---
    location /s3/ {
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass http://minio:9000;
        include /etc/nginx/conf.d/proxy_params.conf;
        # Cache tile responses
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- LiveKit signaling ---
    location /livekit/ {
        proxy_pass http://livekit:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
