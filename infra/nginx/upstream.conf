# Game engine REST API: Main PC primary + Zynq ARM nodes as backup
# Game engine REST API: main PC (weight 5) + 5× Zynq ARM nodes (weight 1 each).
# All nodes are active — room state lives in Valkey, so any node can serve any request.
upstream zynq_game {
    least_conn;
    server game:3000              weight=5 max_fails=3 fail_timeout=30s;
    server 192.168.1.101:3000    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.102:3000    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.103:3000    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.104:3000    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.105:3000    weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Socket.io (port 3001): same active distribution.
# Valkey pub/sub adapter ensures broadcasts reach clients on any node.
upstream zynq_game_sio {
    least_conn;
    server game:3001              weight=5 max_fails=3 fail_timeout=30s;
    server 192.168.1.101:3001    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.102:3001    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.103:3001    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.104:3001    weight=1 max_fails=3 fail_timeout=30s;
    server 192.168.1.105:3001    weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── api.${DOMAIN} — public backend ───────────────────────────────────────────
# ${DOMAIN} is substituted by envsubst during deploy (build-deploy.yml).
# Serves: game API, WebSocket, workers admin API, MinIO S3, LiveKit.
server {
    listen 80;
    listen 443 ssl;
    server_name api.${DOMAIN};

    # Let's Encrypt certificate (issued/renewed by certbot service via Cloudflare DNS challenge)
    ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;

    # ── Auth endpoints — brute-force protection (5 req/min, burst 3) ─────────
    location /api/auth/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,Cookie' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        limit_conn conn 10;
        limit_req zone=auth burst=5 nodelay;
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Game REST API ────────────────────────────────────────────────────────
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,Cookie' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        limit_conn conn 30;
        limit_req zone=api burst=30 nodelay;
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Socket.io (room events) ──────────────────────────────────────────────
    # Runs on port 3001. Valkey adapter syncs rooms across nodes, so any node
    # can serve socket.io clients — no sticky routing needed.
    location /socket.io/ {
        set $backend_sio http://zynq_game_sio;
        proxy_pass         $backend_sio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Workers admin WebSocket (tiling status + user events) ────────────────
    location /admin/ws/ {
        set $backend_workers http://workers:8000;
        proxy_pass $backend_workers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Workers admin API ────────────────────────────────────────────────────
    location /admin/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,Cookie' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        set $backend_workers http://workers:8000;
        proxy_pass $backend_workers;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── MinIO presigned PUT uploads ───────────────────────────────────────────
    # Browser uploads panoramas directly to MinIO via presigned PUT URL.
    # Path has no /s3/ prefix (MinIO path-style). Host must match signed host.
    location ~* ^/gssr-panoramas/raw/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Methods' 'PUT, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, x-amz-date, x-amz-content-sha256, authorization' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        set $backend_minio http://minio:9000;
        proxy_pass $backend_minio;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500m;
        # MinIO already returns Access-Control-Allow-Origin for PUT — no add_header here
    }

    # ── MinIO S3 — panorama tiles, floor images, avatars ─────────────────────
    # MinIO handles CORS (returns Access-Control-Allow-Origin based on its bucket config).
    location ~* ^/s3/gssr-panoramas/maps/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/s3/gssr-panoramas/raw/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "no-store";
    }

    location ~* ^/s3/gssr-(floors|avatars)/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
    }

    # ── LiveKit (voice chat WebSocket + HTTP signaling) ──────────────────────
    location /livekit/ {
        set $backend_livekit http://livekit:7880;
        proxy_pass $backend_livekit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── /utils/ — developer & admin tools ────────────────────────────────────
    # Game Swagger UI (swag):       https://api.${DOMAIN}/utils/game/docs/
    # Workers FastAPI docs:         https://api.${DOMAIN}/utils/workers/docs
    # Grafana:                      https://api.${DOMAIN}/utils/grafana/
    # pgAdmin:                      https://api.${DOMAIN}/utils/pgadmin/
    # Portainer:                    https://api.${DOMAIN}/utils/portainer/
    # RabbitMQ management:          https://api.${DOMAIN}/utils/mq/
    #
    # Admin tools require HTTP Basic Auth (same credentials as admin panel).
    # Generate utils.htpasswd before first deploy (run in infra/nginx/):
    #   echo "$ADMIN_USERNAME:$(openssl passwd -apr1 "$ADMIN_PASSWORD")" > utils.htpasswd
    #
    # MinIO console: kept on SSH tunnel only (no subpath support in MinIO console).
    #   ssh -L 9001:localhost:9001 -p $SSH_PORT deploy@<server>  → http://localhost:9001

    # Game Swagger UI — prefix stripped, swag serves /swagger/*
    location /utils/game/docs/ {
        rewrite ^/utils/game/docs/(.*)$ /swagger/$1 break;
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Workers FastAPI docs — prefix stripped; uvicorn --root-path /utils/workers
    # makes swagger-ui request openapi.json from the correct public path.
    location /utils/workers/ {
        rewrite ^/utils/workers/(.*)$ /$1 break;
        set $backend_workers http://workers:8000;
        proxy_pass $backend_workers;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Grafana — GF_SERVER_SERVE_FROM_SUB_PATH=true handles the prefix internally;
    # nginx forwards the full /utils/grafana/... path unchanged.
    location /utils/grafana/ {
        auth_basic "GSSR Admin";
        auth_basic_user_file /etc/nginx/conf.d/utils.htpasswd;
        set $backend_grafana http://grafana:3000;
        proxy_pass $backend_grafana;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # pgAdmin — SCRIPT_NAME=/utils/pgadmin handles the prefix internally.
    location /utils/pgadmin/ {
        auth_basic "GSSR Admin";
        auth_basic_user_file /etc/nginx/conf.d/utils.htpasswd;
        set $backend_pgadmin http://pgadmin:5050;
        proxy_pass $backend_pgadmin;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Portainer — --base-url=/utils/portainer handles the prefix internally;
    # WebSocket headers needed for live container logs.
    location /utils/portainer/ {
        auth_basic "GSSR Admin";
        auth_basic_user_file /etc/nginx/conf.d/utils.htpasswd;
        set $backend_portainer http://portainer:9000;
        proxy_pass $backend_portainer;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # RabbitMQ management — management.path_prefix=/utils/mq in rabbitmq.conf.
    location /utils/mq/ {
        auth_basic "GSSR Admin";
        auth_basic_user_file /etc/nginx/conf.d/utils.htpasswd;
        set $backend_mq http://rabbitmq:15672;
        proxy_pass $backend_mq;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

# ── minio.${DOMAIN} — MinIO object storage console ───────────────────────────
# Dedicated subdomain: MinIO console SPA uses absolute asset paths (/static/,
# /api/v1/) that make subpath proxying impossible.
#
# One-time prerequisites:
#   1. Cloudflare DNS → add A record  minio → <server-IP>  (DNS-only, grey cloud)
#   2. Expand Let's Encrypt cert to include minio.${DOMAIN}:
#        certbot certonly --dns-cloudflare \
#          --dns-cloudflare-credentials /cloudflare.ini \
#          --non-interactive --agree-tos -m ${CERT_EMAIL} \
#          -d api.${DOMAIN} -d minio.${DOMAIN}
#      (cert path stays /etc/letsencrypt/live/api.${DOMAIN}/ — first domain unchanged)
server {
    listen 80;
    listen 443 ssl;
    server_name minio.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;

    # HTTP Basic Auth gate — same credentials as /utils/ tools
    auth_basic "MinIO Console";
    auth_basic_user_file /etc/nginx/conf.d/utils.htpasswd;

    location / {
        set $backend_minio_console http://minio:9001;
        # Strip the Basic auth header so MinIO doesn't misinterpret it as S3 auth
        proxy_set_header Authorization "";
        proxy_pass $backend_minio_console;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

# ── catch-all: reject unknown hosts ─────────────────────────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;
    server_name _;
    return 444;
}
