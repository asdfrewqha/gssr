# Game engine: Main PC primary + Zynq ARM nodes as backup
upstream zynq_game {
    least_conn;
    server game:3000 max_fails=3 fail_timeout=30s;
    # Zynq ARM nodes (backup when available)
    server 192.168.1.101:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.102:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.103:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.104:3000 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.105:3000 max_fails=3 fail_timeout=30s backup;
    keepalive 32;
}

# ── api.${DOMAIN} — public backend ───────────────────────────────────────────
# ${DOMAIN} is substituted by envsubst during deploy (build-deploy.yml).
# Serves: game API, WebSocket, workers admin API, MinIO S3, LiveKit.
server {
    listen 80;
    listen 443 ssl;
    server_name api.${DOMAIN};

    # Let's Encrypt certificate (issued/renewed by certbot service via Cloudflare DNS challenge)
    ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;

    # ── Auth endpoints — brute-force protection (5 req/min, burst 3) ─────────
    location /api/auth/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,Cookie' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        limit_conn conn 10;
        limit_req zone=auth burst=5 nodelay;
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Game REST API ────────────────────────────────────────────────────────
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,Cookie' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        limit_conn conn 30;
        limit_req zone=api burst=30 nodelay;
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── WebSocket (room events) ──────────────────────────────────────────────
    location /ws/ {
        set $backend_game http://zynq_game;
        proxy_pass $backend_game;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Workers admin API ────────────────────────────────────────────────────
    location /admin/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,Cookie' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        set $backend_workers http://workers:8000;
        proxy_pass $backend_workers;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── MinIO S3 — panorama tiles, floor images, avatars ─────────────────────
    location ~* ^/s3/gssr-panoramas/maps/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/s3/gssr-panoramas/raw/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "no-store";
    }

    location ~* ^/s3/gssr-(floors|avatars)/ {
        set $backend_minio http://minio:9000;
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass $backend_minio;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
    }

    # ── LiveKit (voice chat WebSocket + HTTP signaling) ──────────────────────
    location /livekit/ {
        set $backend_livekit http://livekit:7880;
        proxy_pass $backend_livekit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}

# ── catch-all: reject unknown hosts ─────────────────────────────────────────
# SSH tunnel: ssh -L 3001:localhost:3001 -L 5050:localhost:5050
#   -L 9001:localhost:9001 -L 15672:localhost:15672 -L 9002:localhost:9002
#   -p $SSH_PORT deploy@<server-ip>
# Then: http://localhost:3001 grafana, :5050 pgadmin, :9001 minio, :15672 mq, :9002 portainer
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;
    server_name _;
    return 444;
}
