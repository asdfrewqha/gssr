worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 30;

    # Large uploads for panoramas
    client_max_body_size 100m;
    client_body_buffer_size 256k;   # keep bodies ≤256 KB in RAM (no temp-file I/O)
    client_body_timeout 300s;       # match proxy timeouts; CF origin timeout is ~100s

    # Gzip — critical for slow upload links
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff2;

    # Larger proxy buffers — keep responses in RAM, avoid slow disk temp files
    proxy_buffer_size 32k;
    proxy_buffers 16 64k;
    proxy_busy_buffers_size 128k;

    # Yandex Cloud API Gateway real client IP
    # (without this, rate limiting sees Yandex Cloud gateway IPs)
    set_real_ip_from 84.201.0.0/16;
    set_real_ip_from 84.252.0.0/16;
    set_real_ip_from 130.193.0.0/16;
    set_real_ip_from 158.160.0.0/16;
    set_real_ip_from 51.250.0.0/16;
    set_real_ip_from 51.252.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # SSL (Cloudflare Origin Certificate — shared by all server blocks)
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # HTTP/1.1 to origin — Cloudflare opens ~6 parallel connections.
    # With HTTP/2 (one muxed connection), ISP killing it drops ALL requests at once.
    # With HTTP/1.1, each file transfers on its own connection — one reset ≠ total failure.
    # (http2 directive removed intentionally)

    # Docker embedded DNS — lets proxy_pass with variables resolve at runtime
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    include /etc/nginx/conf.d/*.conf;
}
