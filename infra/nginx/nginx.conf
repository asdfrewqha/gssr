worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 30;

    # Large uploads for panoramas
    client_max_body_size 100m;
    client_body_buffer_size 256k;
    client_body_timeout 300s;

    # Gzip — critical for slow upload links
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff2;

    # Larger proxy buffers — keep responses in RAM, avoid slow disk temp files
    proxy_buffer_size 32k;
    proxy_buffers 16 64k;
    proxy_busy_buffers_size 128k;

    # SSL settings — certificates defined per server block in upstream.conf
    ssl_protocols TLSv1.2 TLSv1.3;
    http2 on;

    # Docker embedded DNS — lets proxy_pass with variables resolve at runtime
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api:10m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=20r/m;  # 20 login attempts/min per IP
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Return 429 Too Many Requests instead of default 503
    limit_req_status  429;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}
