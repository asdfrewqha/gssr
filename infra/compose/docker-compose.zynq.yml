name: gssr-game

services:
  game:
    image: ${DOCKERHUB_USERNAME}/gssr-game:latest
    platform: linux/arm/v7
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
      - "2112:2112"   # Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
