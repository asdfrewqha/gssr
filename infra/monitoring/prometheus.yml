global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: game
    static_configs:
      - targets:
          - 192.168.1.101:2112
          - 192.168.1.102:2112
          - 192.168.1.103:2112
          - 192.168.1.104:2112
          - 192.168.1.105:2112
        labels:
          service: game-engine

  - job_name: workers
    static_configs:
      - targets: [workers:8000]
        labels:
          service: workers

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: node
    static_configs:
      - targets: [localhost:9100]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: rabbitmq
    static_configs:
      - targets: [rabbitmq:15692]
