apiVersion: apps/v1
kind: Deployment
metadata:
  name: game
  namespace: gssr
spec:
  replicas: 5
  selector:
    matchLabels:
      app: game
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: game
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - game
      containers:
        - name: game
          image: DOCKERHUB_USERNAME/gssr-game:latest
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 2112
              name: metrics
          envFrom:
            - configMapRef:
                name: game-config
            - secretRef:
                name: game-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
